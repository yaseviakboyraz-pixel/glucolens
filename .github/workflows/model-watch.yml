name: GlucoLens Model Deprecation Watch

# PROACTIVE companion to uptime.yml's deep canary. The canary tells you a model
# is ALREADY broken; this tells you one is SCHEDULED to break, with weeks of
# lead time, so migration is a calm code change and never an outage.
# Alerts the same way uptime.yml does: a failed step emails the repo owner.

on:
  schedule:
    - cron: '17 6 * * *'   # daily, 06:17 UTC
  workflow_dispatch:        # allow manual runs for testing

jobs:
  model-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Proactive model-deprecation check
        env:
          APP_URL: https://glucolens-nine.vercel.app
          HEALTH_CHECK_TOKEN: ${{ secrets.HEALTH_CHECK_TOKEN }}
          WARN_DAYS: '75'
        run: node scripts/model-watch.mjs
